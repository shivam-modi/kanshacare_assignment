app = "kanshacare-alerts"
primary_region = "iad"
kill_signal = "SIGINT"
kill_timeout = "15s"

[build]
  dockerfile = "services/alerts/Dockerfile"

[env]
  ENV = "production"
  LOG_FORMAT = "json"

# alerts-svc runs the change-stream consumer + cron schedulers. Must NOT scale
# above 1 (rules would double-fire). The dedup index would actually catch
# duplicates, but we'd waste cycles and Telegram-rate-limit slots.
[http_service]
  internal_port = 8002
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

  [[http_service.checks]]
    grace_period = "20s"
    interval = "30s"
    method = "GET"
    timeout = "5s"
    path = "/healthz"

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 512
