app = "kanshacare-web"
primary_region = "iad"
kill_signal = "SIGINT"
kill_timeout = "10s"

[build]
  dockerfile = "../web/Dockerfile"
  build-target = "runtime"

[env]
  NODE_ENV = "production"
  # NEXT_PUBLIC_API_BASE_URL is baked at build-time; set via flyctl secrets
  # AND via [build.args] before deploying, since Next inlines it into the bundle.

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  # Keep one machine warm so the interview demo doesn't hit a 5-10s cold-start.
  # Bump to 0 again post-interview if you want to save the ~$2/mo idle cost.
  min_machines_running = 1

  [[http_service.checks]]
    grace_period = "10s"
    interval = "30s"
    method = "GET"
    timeout = "5s"
    path = "/"

  [http_service.concurrency]
    type = "connections"
    hard_limit = 250
    soft_limit = 100

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 256
